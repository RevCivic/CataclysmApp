{% extends "base.html" %}
{% block content %}
<div class="index_menu">
    <h1 class="app_name">Mind Maps</h1>
    <a href="{% url 'mindmap_add' %}" class="btn btn-primary">Add Mind Map</a>
</div>
<ul style="list-style:none; padding:0; margin-top:1rem;">
  {% for mindmap in mindmaps %}
    <li style="margin-bottom:0.5rem;">
        <a class="lcars-tab" href="{% url 'mindmap_detail' mindmap.pk %}">{{ mindmap.title }}</a>
    </li>
  {% empty %}
    <li style="color: var(--lcars-muted);">No mind maps found.</li>
  {% endfor %}
</ul>
{% endblock %}
