{% extends 'base.html' %}
{% block content %}
<div class="lcars-panel">
    <div class="lcars-heading">
        <span class="chip"></span>
        <h2>{{ object.name|default:'World' }}</h2>
    </div>
    <p><strong>System:</strong> {{ object.system|default:'-' }}</p>
    <p><strong>Planet class:</strong> {{ object.planet_class|default:'-' }}</p>
    <a class="lcars-btn" href="{% url 'worlds:index' %}">Back</a>
</div>
{% endblock %}
