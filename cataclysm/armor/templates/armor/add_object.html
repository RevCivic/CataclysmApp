{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container sci-fi-form-container" style="max-width:700px; margin-top:24px;">
  <h1>Add Armor</h1>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form|crispy }}
    <div class="mb-3">
      <label for="id_new_tags" class="form-label">New tags (comma-separated)</label>
      <input id="id_new_tags" name="new_tags" type="text" class="form-control" placeholder="e.g. Tactical, Ceremonial">
    </div>
    <button type="submit" class="btn btn-primary">Save Armor</button>
  </form>
</div>
{% endblock %}
