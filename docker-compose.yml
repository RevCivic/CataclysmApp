version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: cataclysmapp:latest
    ports:
      - "8000:8000"
    environment:
      PORT: ${PORT:-8000}
      DEFAULT_USERNAME: ${DEFAULT_USERNAME?Required environment variable not set}
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD?Required environment variable not set}
