services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: cataclysmapp:latest
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      PORT: ${PORT:-8000}
      DEFAULT_USERNAME: ${DEFAULT_USERNAME?DEFAULT_USERNAME environment variable not set}
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD?DEFAULT_PASSWORD environment variable not set}
